#All input-related config (keyboard, touchpad, gestures, etc.) with the exception of keybinds


input {
    #Keyboard layout
    kb_layout = us
    kb_variant = altgr-intl

    #Hold-down repeating input
    repeat_rate = 30
    repeat_delay = 300  

    #Click windows to focus
    follow_mouse = 2

    #Invert touchpad scroll
    touchpad {
        natural_scroll = true
    }
}


gestures {
    #Feeling tweaks
    workspace_swipe_distance = 2000
    workspace_swipe_min_speed_to_force = 10
    workspace_swipe_direction_lock = false
}

#Swipe touchpad with three fingers to change workspaces
gesture = 3, horizontal, workspace


cursor {
    #Same as border size to prevent cursor from overshooting
    hotspot_padding = 3

    #Hide the cursor after some time
    inactive_timeout = 3

    #Don't teleport the cursor when focusing windows with the keyboard
    no_warps = true
}
