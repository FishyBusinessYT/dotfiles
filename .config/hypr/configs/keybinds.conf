# All keybindings and shortcuts

# Apps
bind = SUPER, T, exec, $terminal
bind = SUPER, F, exec, $browser
#bind = SUPER, E, exec, $fileExplorer
bind = SUPER, G, exec, godot

# Shutdown, suspend and reboot
bindl = SUPER SHIFT, F4, exec, systemctl poweroff
bindl = SUPER SHIFT, DELETE, exec, systemctl reboot
bindl = SUPER SHIFT, ESCAPE, exec, systemctl suspend

# Lock screen
bind = SUPER SHIFT, L, exec, hyprlock

# Take screenshot
bind = SUPER SHIFT, S, exec, hyprshot -m region -s --clipboard-only

# Open color picker
bind = SUPER SHIFT, P, exec, hyprpicker -a -n --format=hex

# Open clipboard history
bind = SUPER, V, exec, killall clipboard_history.sh || kitty --class clipboard-kitty -e ~/.config/hypr/scripts/clipboard_history.sh

# Close window
bind = SUPER, Q, killactive

# Move focus with mainMod + arrow keys
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Switch workspaces with mainMod + [1-5]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Goto next occupied workspace
bind = SUPER, 0, workspace, e+1

# Goto previous occupied workspace
bind = SUPER SHIFT, 0, workspace, e-1

# Move active window to a workspace with mainMod + SHIFT + [1-5]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Laptop multimedia keys for volume and LCD brightness
$mediaControl = $HOME/.config/hypr/scripts/media_control.sh
bindel = ,XF86AudioRaiseVolume, exec, $mediaControl 'vol_up'
bindel = ,XF86AudioLowerVolume, exec, $mediaControl 'vol_down'
bindel = ,XF86AudioMute, exec, $mediaControl 'vol_mute'
bindel = ,XF86AudioMicMute, exec, $mediaControl 'mic_mute'
bindel = ,XF86MonBrightnessUp, exec, $mediaControl 'brightness_up'
bindel = ,XF86MonBrightnessDown, exec, $mediaControl 'brightness_down'
