$font = Rodondo
$calendar_color = rgba(ffffffcc)
$clock_color = rgba(ffffffcc)
$input_color = rgba(ffffff66)

general {
    hide_cursor = false
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fade, 1, 2, linear
    animation = inputFieldColors, 1, 6, linear
    animation = inputFieldFade, 1, 3, linear
    animation = inputFieldWidth, 1, 2, linear
    animation = inputFieldDots, 1, 3, linear
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpapers/current.png
    reload_time = 30
}

input-field {
    monitor =
    size = 17%, 5%
    outline_thickness = 3

    dots_size = 0.3
    dots_spacing = 0.5
    font_family = $font

    rounding = -1
    fade_on_empty = true
    placeholder_text =

    outer_color = $input_color
    inner_color = rgba(00000000)
    font_color = $input_color
    check_color = rgba(ffffffaa)

    position = 0, 80
    halign = center
    valign = bottom
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = $clock_color
    font_size = 80
    font_family = $font

    position = -630, 75
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $clock_color
    font_size = 80
    font_family = $font

    position = -630, -27
    halign = center
    valign = center
}

# Today
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%a')"
    color = $calendar_color
    font_size = 70
    font_family = $font

    position = 650, 75
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $calendar_color
    font_size = 45
    font_family = $font

    position = 650, -15
    halign = center
    valign = center
}
