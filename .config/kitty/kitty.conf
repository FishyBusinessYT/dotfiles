#FONTS
font_size 12.0
font_family      family="JetBrainsMonoNL Nerd Font Mono"
bold_font        family='JetBrainsMonoNL Nerd Font Mono' style=ExtraBold
italic_font      auto
bold_italic_font family='JetBrainsMonoNL Nerd Font Mono' style='ExtraBold Italic'

#TEXT CURSOR
cursor_shape                 underline
cursor_shape_unfocused       unchanged
cursor_stop_blinking_after   10.0
cursor_trail                 1
cursor_trail_decay           0.1 0.3
cursor_trail_start_threshold 4

#SCROLLBACK
scrollback_lines 500
scrollbar hovered

#MOUSE
mouse_hide_wait -1.0 0 0  no
select_by_word_characters none

#TERMINAL BELL
enable_audio_bell    no
visual_bell_duration 0.5
visual_bell_color    #999944

#WINDOW LAYOUT
remember_window_size    yes
initial_window_width    120c
initial_window_height   30c
hide_window_decorations yes
enabled_layouts         grid

#TAB BAR
tab_bar_edge  top
tab_bar_style slant

#COLOR SCHEME
background_opacity 0.8
background_blur    1

#ADVANCED
notify_on_cmd_finish invisible 10.0 notify

#SHORTCUTS
map ctrl+shift+enter new_window_with_cwd
